<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syno Photo Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; display: grid; grid-template-columns: minmax(0, 1fr) 320px; height: 100vh; }
    #graph-wrap { display: flex; flex-direction: column; min-width: 0; }
    #toolbar { padding: 10px; border-bottom: 1px solid #ddd; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    #graph { flex:1; width:100%; height:100%; background:#fafafa; cursor: grab; }
    #graph:active { cursor: grabbing; }
    #side { border-left:1px solid #ddd; padding: 10px; overflow:auto; }
    #status { font-size:12px; color:#555; }
    .zoom-controls { margin-left:auto; display:flex; gap:6px; align-items:center; }
    .zoom-controls button { min-width:34px; }
    .node-label { font-size: 11px; fill: #333; text-anchor: middle; pointer-events: none; }
    .cluster-count { font-size: 12px; fill: #333; text-anchor: middle; pointer-events: none; font-weight: bold; }
    @media (max-width: 1180px) {
      body { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) 260px; }
      #side { border-left: none; border-top: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <div id="graph-wrap">
    <div id="toolbar">
      <button id="reindex">Reindex</button>
      <label>Model <select id="modelSelect"></select></label>
      <button id="applyModel">Apply & Reindex</button>
      <span id="modelWarning" style="font-size:12px;color:#8a4b00;">Changing model rebuilds embeddings and graph.</span>
      <label>Min similarity <input id="threshold" type="range" min="0" max="1" step="0.01" value="0"/></label>
      <span id="thresholdValue">0.00</span>
      <input id="search" placeholder="Search filename" />
      <span id="status">Loading...</span>
      <div class="zoom-controls">
        <button id="zoomOut" title="Zoom out">−</button>
        <button id="zoomIn" title="Zoom in">+</button>
        <button id="zoomReset" title="Reset view">Reset</button>
      </div>
    </div>
    <svg id="graph"></svg>
  </div>
  <aside id="side">
    <h3>Selection</h3>
    <div id="details">Click a node</div>
  </aside>
<script>
const svg = d3.select('#graph');
const graphElement = document.getElementById('graph');
const graphWrap = document.getElementById('graph-wrap');
const toolbar = document.getElementById('toolbar');

let width = 1200;
let height = 800;

const viewport = svg.append('g').attr('class', 'viewport');
const clusterLayer = viewport.append('g').attr('class', 'clusters');
const linkLayer = viewport.append('g').attr('class', 'links');
const nodeLayer = viewport.append('g').attr('class', 'nodes');
const labelLayer = viewport.append('g').attr('class', 'labels');

const clusterColors = d3.scaleOrdinal(d3.schemeTableau10);
const zoomBehavior = d3.zoom().scaleExtent([0.12, 24]).on('zoom', event => {
  currentTransform = event.transform;
  viewport.attr('transform', currentTransform);
  renderScene();
});
svg.call(zoomBehavior);

let graph = {nodes: [], edges: []};
let nodesById = new Map();
let nodePositions = new Map();
let edgesPrepared = [];
let clustersPrepared = [];
let simThreshold = 0;
let lastLoadedGraphSignature = '';
let isFetchingGraph = false;
let wasRunning = false;
let activeModel = '';
let modelsLoaded = false;
let searchQuery = '';
let currentTransform = d3.zoomIdentity;

function resizeGraph() {
  const rect = graphWrap.getBoundingClientRect();
  const toolbarHeight = toolbar.getBoundingClientRect().height;
  width = Math.max(320, Math.floor(rect.width));
  height = Math.max(260, Math.floor(rect.height - toolbarHeight));
  svg.attr('viewBox', `0 0 ${width} ${height}`);
  svg.attr('width', width).attr('height', height);
  renderScene();
}

new ResizeObserver(resizeGraph).observe(graphWrap);
window.addEventListener('resize', resizeGraph);
resizeGraph();

async function loadModels() {
  const [modelsResp, configResp] = await Promise.all([fetch('/api/models'), fetch('/api/config')]);
  const modelsPayload = await modelsResp.json();
  const config = await configResp.json();
  activeModel = config.active_model;
  const select = document.getElementById('modelSelect');
  select.innerHTML = '';
  for (const m of modelsPayload.models) {
    const opt = document.createElement('option');
    opt.value = m.name;
    opt.textContent = `${m.label} (${m.speed_hint})`;
    opt.title = m.description;
    if (m.name === activeModel) opt.selected = true;
    select.appendChild(opt);
  }
  modelsLoaded = true;
}

function setControlsDisabled(disabled) {
  document.getElementById('reindex').disabled = disabled;
  document.getElementById('modelSelect').disabled = disabled;
  document.getElementById('applyModel').disabled = disabled;
}

function graphSignatureFromStatus(status) {
  return `${status.active_model}:${status.images}:${status.embeddings}:${status.edges}`;
}

function resetZoom(duration = 350) {
  svg.transition().duration(duration).call(zoomBehavior.transform, d3.zoomIdentity);
}

function applyInitialLayout(nodes) {
  const spread = Math.min(width, height) * 0.42;
  nodes.forEach(node => {
    if (Number.isFinite(node.x) && Number.isFinite(node.y)) {
      nodePositions.set(node.id, {
        x: width / 2 + node.x * spread,
        y: height / 2 + node.y * spread,
      });
    } else {
      nodePositions.set(node.id, {
        x: width / 2 + (Math.random() - 0.5) * spread,
        y: height / 2 + (Math.random() - 0.5) * spread,
      });
    }
  });
}

function prepareGraphData() {
  nodePositions.clear();
  applyInitialLayout(graph.nodes);

  edgesPrepared = graph.edges
    .filter(e => e.similarity >= simThreshold)
    .map(e => ({...e, source: nodePositions.get(e.src_id), target: nodePositions.get(e.dst_id)}))
    .filter(e => e.source && e.target);

  const grouped = d3.groups(graph.nodes.filter(n => n.cluster >= 0), d => d.cluster);
  clustersPrepared = grouped.map(([cluster, members]) => {
    const points = members.map(m => nodePositions.get(m.id)).filter(Boolean);
    const cx = d3.mean(points, p => p.x) || width / 2;
    const cy = d3.mean(points, p => p.y) || height / 2;
    const radius = Math.max(40, (d3.max(points, p => Math.hypot(p.x - cx, p.y - cy)) || 20) + 30);
    return {
      cluster,
      members,
      cx,
      cy,
      radius,
    };
  });
}

async function fetchGraph(signature = '') {
  if (isFetchingGraph) return;
  isFetchingGraph = true;
  try {
    const r = await fetch('/api/graph?limit=5000&min_sim=0');
    graph = await r.json();
    nodesById = new Map(graph.nodes.map(n => [n.id, n]));
    prepareGraphData();
    if (signature) {
      lastLoadedGraphSignature = signature;
    }
    resetZoom(10);
    renderScene();
  } finally {
    isFetchingGraph = false;
  }
}

async function pollStatus() {
  const r = await fetch('/api/status');
  const s = await r.json();
  activeModel = s.active_model || activeModel;
  const watchInfo = s.watcher_enabled ? ` watch:${s.dirty_flag ? 'dirty' : 'clean'}` : ' watch:off';
  document.getElementById('status').textContent = `${activeModel} | ${s.stage} ${s.progress_current}/${s.progress_total} | imgs:${s.images} emb:${s.embeddings} edges:${s.edges}${watchInfo}`;
  setControlsDisabled(!!s.running);

  if (s.running) {
    wasRunning = true;
    return;
  }

  const nextSig = graphSignatureFromStatus(s);
  const hasGraphData = graph.nodes.length > 0 || graph.edges.length > 0;
  const shouldFetch = s.images > 0 && (!hasGraphData || wasRunning || nextSig !== lastLoadedGraphSignature);
  wasRunning = false;

  if (shouldFetch) {
    await fetchGraph(nextSig);
  }
}
setInterval(pollStatus, 1500);

function getViewportBounds() {
  const x0 = (0 - currentTransform.x) / currentTransform.k;
  const y0 = (0 - currentTransform.y) / currentTransform.k;
  const x1 = (width - currentTransform.x) / currentTransform.k;
  const y1 = (height - currentTransform.y) / currentTransform.k;
  return {x0, y0, x1, y1};
}

function inBounds(point, bounds, pad = 0) {
  return point.x >= bounds.x0 - pad && point.x <= bounds.x1 + pad && point.y >= bounds.y0 - pad && point.y <= bounds.y1 + pad;
}

function sampleRepresentativeNodes(nodes, bounds, gridSize) {
  const byCell = new Map();
  for (const n of nodes) {
    const p = nodePositions.get(n.id);
    if (!p || !inBounds(p, bounds, 140)) continue;
    const key = `${Math.floor(p.x / gridSize)}:${Math.floor(p.y / gridSize)}:${n.cluster}`;
    const bucket = byCell.get(key) || [];
    bucket.push(n);
    byCell.set(key, bucket);
  }

  const reps = [];
  for (const [, bucket] of byCell) {
    bucket.sort((a, b) => a.filename.localeCompare(b.filename));
    const representative = bucket[0];
    reps.push({
      node: representative,
      count: bucket.length,
    });
  }
  return reps;
}

function applySearchOpacity(selection) {
  selection.attr('opacity', d => {
    const node = d.node || d;
    return !searchQuery || node.filename.toLowerCase().includes(searchQuery) ? 1 : 0.2;
  });
}

function renderScene() {
  if (!graph.nodes.length) return;

  const k = currentTransform.k;
  const bounds = getViewportBounds();

  clusterLayer.selectAll('*').remove();
  linkLayer.selectAll('*').remove();
  nodeLayer.selectAll('*').remove();
  labelLayer.selectAll('*').remove();

  if (k < 0.45) {
    const visibleClusters = clustersPrepared.filter(c => inBounds({x: c.cx, y: c.cy}, bounds, c.radius));
    clusterLayer.selectAll('circle')
      .data(visibleClusters)
      .enter()
      .append('circle')
      .attr('cx', d => d.cx)
      .attr('cy', d => d.cy)
      .attr('r', d => d.radius)
      .attr('fill', d => clusterColors(d.cluster))
      .attr('fill-opacity', 0.11)
      .attr('stroke', d => clusterColors(d.cluster))
      .attr('stroke-opacity', 0.35)
      .attr('stroke-width', 1.4);

    labelLayer.selectAll('text')
      .data(visibleClusters)
      .enter()
      .append('text')
      .attr('class', 'cluster-count')
      .attr('x', d => d.cx)
      .attr('y', d => d.cy)
      .text(d => `${d.members.length} images`);
    return;
  }

  const drawLinks = k >= 1;
  const maxNodes = k >= 2 ? 1400 : 800;
  const gridSize = Math.max(70, 220 / k);

  const visibleNodes = graph.nodes.filter(n => {
    const p = nodePositions.get(n.id);
    return p && inBounds(p, bounds, 120);
  });

  let nodesForRender = visibleNodes;
  let representativeMode = false;
  if (k < 1.2) {
    representativeMode = true;
    const reps = sampleRepresentativeNodes(graph.nodes, bounds, gridSize).slice(0, maxNodes);
    nodesForRender = reps.map(r => ({...r.node, _count: r.count, _representative: true}));
  } else {
    nodesForRender = visibleNodes.slice(0, maxNodes);
  }

  const visibleIds = new Set(nodesForRender.map(n => n.id));
  if (drawLinks) {
    const links = edgesPrepared
      .filter(e => visibleIds.has(e.src_id) && visibleIds.has(e.dst_id))
      .slice(0, 3400);

    linkLayer.selectAll('line')
      .data(links)
      .enter().append('line')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y)
      .attr('stroke', '#888')
      .attr('stroke-opacity', d => Math.max(0.06, d.similarity * 0.6))
      .attr('stroke-width', d => 0.3 + d.similarity * 1.8);
  }

  const node = nodeLayer.selectAll('g')
    .data(nodesForRender, d => d.id)
    .enter().append('g')
    .attr('transform', d => {
      const p = nodePositions.get(d.id);
      return `translate(${p.x},${p.y})`;
    });

  const baseRadius = representativeMode ? 15 : 18;

  node.append('clipPath').attr('id', d => `clip-${d.id}`).append('circle').attr('r', baseRadius);
  node.append('image')
    .attr('href', d => `/thumbs/${d.id}.jpg`)
    .attr('x', -baseRadius).attr('y', -baseRadius).attr('width', baseRadius * 2).attr('height', baseRadius * 2)
    .attr('clip-path', d => `url(#clip-${d.id})`)
    .attr('preserveAspectRatio', 'xMidYMid slice')
    .on('error', function(_, d) {
      this.setAttribute('href', `/image/${d.id}?max_dim=128`);
    });

  node.append('circle')
    .attr('r', baseRadius)
    .attr('fill', 'none')
    .attr('stroke', d => d.cluster >= 0 ? clusterColors(d.cluster) : '#fff')
    .attr('stroke-width', d => representativeMode ? 2.2 : 2);

  if (representativeMode) {
    node.append('text')
      .attr('class', 'node-label')
      .attr('y', baseRadius + 13)
      .text(d => (d._count > 1 ? `${d._count}` : ''));
  }

  applySearchOpacity(node);

  node.on('click', (_, d) => showDetails(nodesById.get(d.id) || d));
}

function showDetails(node) {
  const neigh = graph.edges
    .filter(e => e.src_id === node.id || e.dst_id === node.id)
    .map(e => ({id: e.src_id === node.id ? e.dst_id : e.src_id, similarity: e.similarity}))
    .sort((a,b) => b.similarity-a.similarity)
    .slice(0, 12);

  const items = neigh.map(n => `<li>${nodesById.get(n.id)?.filename || n.id} (${n.similarity.toFixed(3)})</li>`).join('');
  const clusterInfo = node.cluster >= 0 ? `<p><strong>Cluster:</strong> ${node.cluster}</p>` : '';
  document.getElementById('details').innerHTML = `
    <h4>${node.filename}</h4>
    ${clusterInfo}
    <img src="/image/${node.id}?max_dim=512" style="max-width:100%; border-radius:8px" />
    <h5>Top neighbours</h5>
    <ol>${items}</ol>
  `;
}

document.getElementById('threshold').addEventListener('input', e => {
  simThreshold = parseFloat(e.target.value);
  document.getElementById('thresholdValue').textContent = simThreshold.toFixed(2);
  prepareGraphData();
  renderScene();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  renderScene();
});

document.getElementById('reindex').addEventListener('click', async () => {
  await fetch('/api/reindex', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({full:false})});
  loadModels().then(() => pollStatus());
});

document.getElementById('applyModel').addEventListener('click', async () => {
  const selected = document.getElementById('modelSelect').value;
  await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({active_model:selected})});
  loadModels().then(() => pollStatus());
});

document.getElementById('zoomIn').addEventListener('click', () => {
  svg.transition().duration(220).call(zoomBehavior.scaleBy, 1.25);
});

document.getElementById('zoomOut').addEventListener('click', () => {
  svg.transition().duration(220).call(zoomBehavior.scaleBy, 0.8);
});

document.getElementById('zoomReset').addEventListener('click', () => resetZoom());

loadModels().then(() => pollStatus());
</script>
</body>
</html>
